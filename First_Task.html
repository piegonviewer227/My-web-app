<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My DevOps App</title>
  <style>
    body {
      font-family: system-ui, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
      background: #0f172a;
      color: #e2e8f0;
    }
    button {
      margin-top: 1rem;
      padding: 0.6rem 1.2rem;
      font-size: 1rem;
      border: none;
      border-radius: 8px;
      background: #38bdf8;
      color: #0f172a;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <h1>Hello from my pipeline 🚀</h1>
  <p>Clicked <span id="count">0</span> times</p>
  <button id="btn">Click me</button>

  <script>
    let count = 0;
    const span = document.getElementById("count");
    document.getElementById("btn").addEventListener("click", () => {
      count++;
      span.textContent = count;
    });
  </script>
</body>
</html>
